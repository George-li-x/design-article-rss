name: Generate design RSS

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/generate-rss.yml"
      - "config/**"
      - "scripts/**"
  schedule:
    # 08:10 China Standard Time (UTC+8)
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "design-rss-pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install article extractor
        run: pip install "trafilatura>=2.0,<3.0"
      - name: Generate today's feed
        run: python scripts/generate_rss.py
      - name: Save compact state only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json data/published.json
          git diff --cached --quiet || git commit -m "chore: update daily design RSS"
          git push
      - name: Upload current feed to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy current feed
        id: deployment
        uses: actions/deploy-pages@v4
