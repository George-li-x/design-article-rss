name: Generate design RSS

on:
  schedule:
    # 08:10 China Standard Time (UTC+8)
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate today's feed
        run: python scripts/generate_rss.py
      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/design-rss.xml data/seen.json
          git diff --cached --quiet || git commit -m "chore: update daily design RSS"
          git push
